<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI - Dark Glassmorphism Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-row">
    <!-- Sidebar -->
    <aside class="w-[260px] h-full flex flex-col glass m-0 rounded-none border-y-0 border-l-0">
        <div class="p-5">
            <div class="flex items-center gap-2">
                <div class="bg-[#00FFB2] w-2 h-2 rounded-full neon-dot-shadow"></div>
                <h1 class="text-white font-bold text-lg">Nova AI</h1>
            </div>
            <button class="mt-6 w-full border border-[#00FFB2]/40 text-[#00FFB2] rounded-xl py-2 text-sm hover:bg-[#00FFB2]/10 transition flex items-center justify-center gap-2">
                <span>+</span> New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 mt-4">
            <span class="text-white/40 text-xs uppercase px-2 mb-2 block tracking-wider">Recent</span>
            <div class="space-y-1">
                <div class="rounded-lg px-3 py-2 text-white/50 text-sm hover:bg-white/5 cursor-pointer transition">Current Chat</div>
                <div class="rounded-lg px-3 py-2 text-white/50 text-sm hover:bg-white/5 cursor-pointer transition">Previous Chat</div>
            </div>
        </div>

        <div class="p-4 border-t border-white/10">
            <button id="settingsBtn" class="text-white/40 text-sm hover:text-white transition flex items-center gap-2 w-full">
                <span>⚙</span> Settings
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Top Bar -->
        <header class="px-6 py-4 border-b border-white/10 flex items-center justify-between">
            <div class="text-white font-semibold">Nova AI</div>
            <div class="bg-white/10 border border-white/20 text-white/60 text-xs px-3 py-1 rounded-full">
                Model: Gemini 2.0 Flash
            </div>
        </header>

        <!-- Messages Area -->
        <div id="chatMessages" class="flex-1 overflow-y-auto px-6 py-4 flex flex-col gap-4">
            <!-- Messages will be appended here -->
        </div>

        <!-- Typing Indicator (Template) -->
        <div id="typingIndicator" class="hidden self-start max-w-[75%] flex mb-4 px-6 py-2">
            <div class="bg-[#00FFB2]/20 border border-[#00FFB2]/40 w-7 h-7 rounded-full flex items-center justify-center text-xs mr-2 shrink-0">🤖</div>
            <div class="glass px-4 py-3 rounded-2xl rounded-tl-sm text-white flex items-center gap-1">
                <span class="w-1.5 h-1.5 bg-[#00FFB2]/60 rounded-full dot-bounce delay-0"></span>
                <span class="w-1.5 h-1.5 bg-[#00FFB2]/60 rounded-full dot-bounce delay-15"></span>
                <span class="w-1.5 h-1.5 bg-[#00FFB2]/60 rounded-full dot-bounce delay-30"></span>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="px-6 py-4 border-t border-white/10">
            <div class="mb-3 flex gap-2">
                <button id="chatModeBtn" class="transition-all duration-200">💬 Chat</button>
                <button id="imageModeBtn" class="transition-all duration-200">🖼 Generate Image</button>
            </div>

            <div class="flex gap-3 items-end">
                <textarea id="userInput" rows="1" placeholder="Message Nova AI..." 
                    class="flex-1 glass text-white placeholder-white/30 text-sm rounded-2xl px-4 py-3 resize-none outline-none focus:border-[#00FFB2]/50 transition-all"></textarea>
                <button id="sendBtn" class="w-11 h-11 rounded-full bg-[#00FFB2] flex items-center justify-center text-black font-bold hover:scale-105 transition neon-shadow shrink-0">
                    <span class="text-xl leading-none">→</span>
                </button>
            </div>
            <p class="mt-2 text-center text-white/25 text-xs">
                Responses are generated by AI. They may not be entirely accurate.
            </p>
        </footer>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <span>⚙</span> Settings
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-white/50 text-xs uppercase tracking-wider mb-2">OpenRouter API Key</label>
                    <input type="password" id="nvidiaChatKeyInput" placeholder="sk-or-v1-..." class="settings-input">
                </div>
                
                <div>
                    <label class="block text-white/50 text-xs uppercase tracking-wider mb-2">Nvidia Image API Key</label>
                    <input type="password" id="nvidiaImageKeyInput" placeholder="nvapi-..." class="settings-input">
                </div>

                <div>
                    <label class="block text-white/50 text-xs uppercase tracking-wider mb-2">CORS Proxy URL</label>
                    <input type="text" id="corsProxyInput" placeholder="https://proxy.cors.sh/" class="settings-input">
                    <p class="mt-1 text-[9px] text-white/30 italic">Usually ends with / or ?url=</p>
                </div>

                <div class="pt-4 flex gap-3">
                    <button id="saveSettingsBtn" class="flex-1 bg-[#00FFB2] text-black font-bold py-2.5 rounded-xl hover:scale-[1.02] transition">Save Changes</button>
                    <button id="closeSettingsBtn" class="flex-1 bg-white/5 text-white/70 py-2.5 rounded-xl hover:bg-white/10 transition">Cancel</button>
                </div>
            </div>
            <p class="mt-4 text-[10px] text-white/30 text-center">
                Your keys are stored locally in your browser and never sent to our servers.
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
